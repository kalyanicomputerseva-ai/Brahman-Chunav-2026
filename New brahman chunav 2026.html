    .card-body { padding: 20px; }

    .btn { padding: 10px 16px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 13px; }
    .btn-primary { background: linear-gradient(135deg, #C04200, #FF7A2F); color: white; }
    .btn-admin { background: linear-gradient(135deg, #7B0C1C, #A01228); color: white; }
    .btn-success { background: #1E7A3A; color: white; }
    .btn-danger { background: #B00020; color: white; }
    .btn-warning { background: #E67E22; color: white; }
    .btn-sm { padding: 5px 10px; font-size: 11px; }
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 16px; }
    .candidate-card { background: #FEFAF3; border-radius: 20px; padding: 16px; text-align: center; border: 2px solid #EDE0CE; cursor: pointer; transition: 0.2s; }

    .candidate-card.active::after { content: "✓"; position: absolute; top: 8px; right: 12px; background: var(--saffron); color: white; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; display: flex; align-items: center; justify-content: center; }
    .candidate-avatar { width: 60px; height: 60px; background: linear-gradient(135deg,var(--maroon),var(--saffron)); border-radius: 50%; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; }
    .candidate-photo { width: 60px; height: 60px; object-fit: cover; border-radius: 50%; margin: 0 auto; border: 2px solid var(--gold); background: #f0e6d6; }
    .section-title { display: flex; align-items: center; gap: 8px; margin: 18px 0 12px; border-left: 4px solid var(--saffron); padding-left: 12px; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #7B0C1C; color: white; padding: 8px; text-align: left; font-size: 13px; }
    td { padding: 8px; border-bottom: 1px solid #f0e6d6; font-size: 13px; }
    .result-bar { height: 6px; background: #ede0ce; border-radius: 4px; margin-top: 6px; }
    .result-bar-fill { background: linear-gradient(90deg,#E8570A,#FF9F5A); height: 100%; border-radius: 4px; }
    .hidden { display: none !important; }
    .msg { padding: 8px 12px; border-radius: 12px; margin-top: 12px; font-size: 13px; }
    .msg.success { background: #d4edda; color: #155724; }

  window.verifyVoter = async function() {
    const dict = langData[currentLang];
    if(!votingEnabled){ alert(dict.alertVotingClosed); return; }
    let name = document.getElementById('voterName').value.trim();
    let phone = document.getElementById('voterPhone').value.trim();
    if(name.length<3 || phone.length!==10){ alert(dict.alertInvalidDetails); return; }
    const voterQuery = query(collection(db,'voters'), where('phone','==',phone));
    const snap = await getDocs(voterQuery);
    if(!snap.empty && snap.docs[0].data().voted===true && !isTestVoter(phone,name)){ alert(dict.alertAlreadyVoted); return; }
    if(localStorage.getItem('votedDevice')==='yes' && !isTestVoter(phone,name)){ alert(dict.alertDeviceVoted); return; }
    currentVoterPhone = phone; currentVoterName = name;
    await loadActivePosts();
    await buildVotingInterface();
    document.getElementById('votingArea').classList.remove('hidden');
    document.getElementById('voterLoginCard').style.display = 'none';
    showMsg(document.getElementById('voterMsg'), 'success', dict.alertSuccessVerify);
    document.getElementById('votingArea').scrollIntoView({ behavior: 'smooth' });
  };
  
  async function buildVotingInterface() {
    const container = document.getElementById('dynamicVotingContainer');
    if(!container) return;
    const dict = langData[currentLang];
    const posts = await loadActivePosts();
    const candidatesSnap = await getDocs(collection(db,'candidates'));
    const candidates = candidatesSnap.docs.map(d => ({ id:d.id, ...d.data() }));
    if(posts.length === 0){ container.innerHTML = `<div class="msg error">${dict.noPostDefined}</div>`; return; }
    let html = ''; selectedCandidatesMap = {};
    for(let post of posts){
      const normPost = post.name.trim().toLowerCase();
      const postCands = candidates.filter(c => (c.post || "").trim().toLowerCase() === normPost);
      if(postCands.length === 0){
        html += `<div class="section-title"><h3>${post.name}</h3></div><p style="color:gray; padding:8px;">${dict.noCandidate}</p>`;
        continue;
      }
      html += `<div class="section-title"><h3>${post.name}</h3></div><div class="grid-2">`;
      postCands.forEach(cand => {
        const avatar = cand.photo ? `<img src="${cand.photo}" class="candidate-photo">` : `<div class="candidate-avatar">${cand.name.charAt(0)}</div>`;
        const ageString = cand.age ? cand.age + (currentLang === 'sa' ? ' वयः' : currentLang === 'en' ? ' Yrs' : ' वर्ष') : '';
        html += `<div class="candidate-card" data-post="${post.name}" data-candidate="${cand.id}" onclick="selectDynamicCandidate('${post.name.replace(/'/g, "\\'")}','${cand.id}')" id="cand_${cand.id}">
          ${avatar}<div class="candidate-name" style="font-weight:bold;">${cand.name}</div><div>${ageString} ${cand.gender || ''}</div><div>${cand.ward || ''}</div><div style="font-size:11px;">${cand.bio || ''}</div>
        </div>`;
      });
      html += `</div>`;
    }
    container.innerHTML = html;
  }

  window.submitDynamicVote = async function() {
    const dict = langData[currentLang];
    if(!votingEnabled && !isTestVoter(currentVoterPhone, currentVoterName)){ alert(dict.alertVotingClosed); return; }
    const posts = await loadActivePosts();
    for(let post of posts) if(!selectedCandidatesMap[post.name]){ alert(`${dict.alertSelectCandidate}"${post.name}"`); return; }
    const phone = currentVoterPhone;
    if(!phone) { alert(dict.alertSessionExpired); return; }
    const voterRef = doc(db,'voters',phone);
    const voterSnap = await getDoc(voterRef);
    if(voterSnap.exists() && voterSnap.data().voted===true && !isTestVoter(phone,currentVoterName)){ alert(dict.alertAlreadyVoted); return; }
    const batch = writeBatch(db);
    for(let [postName, candId] of Object.entries(selectedCandidatesMap)){
      const candRef = doc(db,'candidates',candId);
      const candSnap = await getDoc(candRef);
      batch.update(candRef, { votes: (candSnap.data().votes||0)+1 });
    }
    await setDoc(voterRef, { name:currentVoterName, phone, voted:true, votedAt:new Date(), testVoter: isTestVoter(phone,currentVoterName) });
    await addDoc(collection(db,'votes'), { phone, selections:selectedCandidatesMap, createdAt:new Date() });
    await batch.commit();
    localStorage.setItem('votedDevice','yes');
    alert(dict.alertVoteSubmitted);
    document.getElementById('votingArea').classList.add('hidden');
    document.getElementById('voterLoginCard').style.display = 'block';
    document.getElementById('voterName').value = ''; document.getElementById('voterPhone').value = '';
    renderResults();
  };
  
  async function renderResults() {
    const dict = langData[currentLang];
    const candidatesSnap = await getDocs(collection(db,'candidates'));
    const candidates = candidatesSnap.docs.map(d => ({ id:d.id, ...d.data() }));
    const posts = await loadActivePosts();
    let html = '';
    for(let post of posts){
      const normPost = post.name.trim().toLowerCase();
      const postCands = candidates.filter(c => (c.post || "").trim().toLowerCase() === normPost).sort((a,b)=>(b.votes||0)-(a.votes||0));
      const total = postCands.reduce((s,c)=>s+(c.votes||0),0);
      html += `<div style="margin-bottom:24px;"><h3 style="color:#7B0C1C;">🏛️ ${post.name}</h3><table style="width:100%"><thead><tr><th>${dict.candidateText}</th><th>${dict.votesText}</th><th>%</th><th>${dict.progressText}</th></tr></thead><tbody>`;
      postCands.forEach(c => {
        let percent = total ? ((c.votes||0)/total*100).toFixed(1) : 0;
        let crown = (postCands[0] && postCands[0].id === c.id && (c.votes||0)>0) ? "👑 " : "";
        html += `<tr><td><strong>${crown}${c.name}</strong><br><small>${c.age||''} ${c.gender||''} ${c.ward||''}</small></td><td>${c.votes||0}</td><td>${percent}%</td><td><div class="result-bar"><div class="result-bar-fill" style="width:${percent}%"></div></div></td></tr>`;
      });
      html += `</tbody></table></div>`;
    }
    document.getElementById('resultDynamicContainer').innerHTML = html || `<p>${dict.noCandidate}</p>`;
  }

    const bio = document.getElementById('newCandBio').value;
    let photoURL = "";
    const file = document.getElementById('newCandPhotoFile').files[0];
    if(file) {
      try {
        const storageRef = ref(storage, `candidate_photos/${Date.now()}_${file.name}`);
        await uploadBytes(storageRef, file);
        photoURL = await getDownloadURL(storageRef);
      } catch(e) { alert("Photo upload failed"); }
    }
    await addDoc(collection(db,'candidates'), { name, post, age, gender, phone, ward, bio, photo: photoURL, votes:0 });
    alert('Candidate Added');
    renderAdminDashboard(); renderResults();
    if(!document.getElementById('votingArea').classList.contains('hidden')) buildVotingInterface();
  };
  
  // ROUTE GATING FOR CANDIDATE DELETION
  window.handleCandidateDeleteGate = async (id, name) => {
    if (loggedInAdminRole === 'superadmin') {
      if (confirm(`Do you really want to permanently delete candidate "${name}"?`)) {
        await deleteDoc(doc(db, 'candidates', id));
        alert('Candidate permanently removed.');
        renderAdminDashboard(); renderResults();
        if(!document.getElementById('votingArea').classList.contains('hidden')) buildVotingInterface();
      }
    } else {
      if (confirm(`You do not have direct deletion rights. Do you want to send a deletion request to Main Admin for "${name}"?`)) {
        const snap = await getDoc(doc(db, 'candidates', id));
        if (snap.exists()) {
          const d = snap.data();
          await addDoc(collection(db, 'pending_candidates'), {
            name: d.name,
            post: d.post,
            age: d.age || '',
            gender: d.gender || '',
            phone: d.phone || '',
            ward: d.ward || '',
            bio: d.bio || '',
            photo: d.photo || '',
            candidateId: id,
            requestType: 'delete',
            requestedBy: loggedInUsername,
            createdAt: new Date()
          });
          alert('Deletion request sent to Main Admin. The candidate will remain listed until approved.');
          renderAdminDashboard();
        } else {
          alert('Error: Candidate not found');
        }
      }
    }
  };

  // MAIN ADMIN APPROVAL ACTION FOR DELETION REQUESTS
  window.approveDeletionRequest = async (pendingId, candidateId) => {
    if (loggedInAdminRole !== 'superadmin') {
      alert('❌ Only Main Admin can approve this request!');
      return;
    }
    if (confirm('Are you sure you want to delete this candidate permanently?')) {
      await deleteDoc(doc(db, 'candidates', candidateId));
      await deleteDoc(doc(db, 'pending_candidates', pendingId));
      alert('Candidate successfully removed.');
      renderAdminDashboard(); renderResults();
      if(!document.getElementById('votingArea').classList.contains('hidden')) buildVotingInterface();
    }
  };
  
  // Full edit candidate
  window.editCandidateFull = async function(candId) {
    const snap = await getDoc(doc(db,'candidates',candId));
    if(!snap.exists()) return alert('Not found');
    const d = snap.data();
    const newName = prompt("Name:", d.name); if(!newName) return;
    const newPost = prompt("Post:", d.post); if(!newPost) return;
    const newAge = prompt("Age:", d.age||"");
    const newGender = prompt("Gender:", d.gender||"");
    const newPhone = prompt("Mobile:", d.phone||"");
    const newWard = prompt("Ward:", d.ward||"");
    const newBio = prompt("Bio:", d.bio||"");
    const changePhoto = confirm("Do you want to change photo?");
    let newPhoto = d.photo || "";
    if(changePhoto) {
      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.accept = 'image/*';
      fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if(file) {
          const storageRef = ref(storage, `candidate_photos/${Date.now()}_${file.name}`);
          await uploadBytes(storageRef, file);
          newPhoto = await getDownloadURL(storageRef);
          await updateDoc(doc(db,'candidates',candId), { name:newName, post:newPost, age:newAge, gender:newGender, phone:newPhone, ward:newWard, bio:newBio, photo:newPhoto });
          alert('Updated');
          renderAdminDashboard(); renderResults(); if(!document.getElementById('votingArea').classList.contains('hidden')) buildVotingInterface();
        }
      };
      fileInput.click();
      return;
    } else {
      await updateDoc(doc(db,'candidates',candId), { name:newName, post:newPost, age:newAge, gender:newGender, phone:newPhone, ward:newWard, bio:newBio, photo:newPhoto });
      alert('Updated');
      renderAdminDashboard(); renderResults(); if(!document.getElementById('votingArea').classList.contains('hidden')) buildVotingInterface();
    }
  };
  
  // Other admin functions
  window.createNewPost = async () => { if(loggedInAdminRole !== 'superadmin' && loggedInAdminRole !== 'headadmin') return; const pname = document.getElementById('newPostName')?.value.trim(); if(!pname) return; await addDoc(collection(db,'posts'),{ name:pname, active:true }); await loadActivePosts(); renderAdminDashboard(); renderResults(); fillSelfPostDropdown(); if(!document.getElementById('votingArea').classList.contains('hidden')) buildVotingInterface(); };
  window.deletePost = async (id) => { if(loggedInAdminRole !== 'superadmin' && loggedInAdminRole !== 'headadmin') return; if(confirm('Delete?')){ await deleteDoc(doc(db,'posts',id)); await loadActivePosts(); renderAdminDashboard(); renderResults(); fillSelfPostDropdown(); } };
  
  window.approveCandidate = async (id) => { 
    if (loggedInAdminRole !== 'superadmin') { alert('❌ Only Main Admin can approve!'); return; }
    const snap = await getDoc(doc(db,'pending_candidates',id)); 
    if(snap.exists()){ 
      const d=snap.data(); 
      await addDoc(collection(db,'candidates'),{ name:d.name, post:d.post, age:d.age, gender:d.gender, phone:d.phone, ward:d.ward, bio:d.bio, photo:d.photo||'', votes:0 }); 
      await deleteDoc(doc(db,'pending_candidates',id)); 
      renderAdminDashboard(); renderResults(); 
      if(!document.getElementById('votingArea').classList.contains('hidden')) buildVotingInterface(); 
    } 
  };
  
  window.rejectCandidate = async (id) => { 
    if (loggedInAdminRole !== 'superadmin') { alert('❌ Only Main Admin can reject!'); return; }
    await deleteDoc(doc(db,'pending_candidates',id)); 
    renderAdminDashboard(); 
  };
  
  window.createSubAdmin = async () => { if(loggedInAdminRole !== 'superadmin') return; const user = document.getElementById('newSubAdminUser')?.value.trim(); const pass = document.getElementById('newSubAdminPass')?.value.trim(); const type = document.getElementById('newSubAdminType')?.value; if(!user||!pass) return; const admins = await getDocs(collection(db,'admins')); if(admins.size >= 4) return alert('Max 4 admins'); let exists=false; admins.forEach(d=>{ if(d.data().username===user) exists=true; }); if(exists) return; await addDoc(collection(db,'admins'),{ username:user, password:pass, role:type==='headadmin'?'headadmin':'subadmin', adminType:type, createdAt:new Date() }); alert('Admin Created'); renderAdminDashboard(); };
  window.createSubAdminByHead = async () => { if(loggedInAdminRole !== 'headadmin') return; const user = document.getElementById('newSubAdminUser')?.value.trim(); const pass = document.getElementById('newSubAdminPass')?.value.trim(); if(!user||!pass) return; const admins = await getDocs(collection(db,'admins')); if(admins.size >= 4) return; let exists=false; admins.forEach(d=>{ if(d.data().username===user) exists=true; }); if(exists) return; await addDoc(collection(db,'admins'),{ username:user, password:pass, role:'subadmin', adminType:'subadmin', createdAt:new Date() }); alert('Sub-Admin Created'); renderAdminDashboard(); };
  window.deleteSubAdmin = async (id) => { if(loggedInAdminRole !== 'superadmin' && loggedInAdminRole !== 'headadmin') return; const docSnap = await getDoc(doc(db,'admins',id)); if(docSnap.exists() && docSnap.data().username === 'Brahman2026') return alert('Cannot remove main admin'); if(confirm('Remove?')){ await deleteDoc(doc(db,'admins',id)); renderAdminDashboard(); } };
  window.updateElectionTitle = async () => { if(loggedInAdminRole !== 'superadmin') return; const title = document.getElementById('editTitle')?.value; if(title) await setDoc(doc(db,'settings','main'),{ electionTitle:title },{ merge:true }); langData.hi.title = title; if(currentLang==='hi') document.getElementById('dynamicElectionTitle').innerText = title; };
  window.toggleGlobalVoting = async () => { if(loggedInAdminRole !== 'superadmin') return; const ref = doc(db,'settings','main'); const snap = await getDoc(ref); const current = snap.exists() ? snap.data().votingEnabled : true; await setDoc(ref,{ votingEnabled:!current },{ merge:true }); votingEnabled = !current; renderAdminDashboard(); };
  window.toggleResultVisibility = async () => { if(loggedInAdminRole !== 'superadmin') return; const ref = doc(db,'settings','main'); const snap = await getDoc(ref); const visible = snap.exists() ? snap.data().resultVisible : true; await setDoc(ref,{ resultVisible:!visible },{ merge:true }); document.getElementById('resultCard').style.display = !visible ? 'block' : 'none'; };
  window.resetAllVotes = async () => { if(loggedInAdminRole !== 'superadmin') return; if(!confirm('Reset all votes?')) return; const cands = await getDocs(collection(db,'candidates')); const batch = writeBatch(db); cands.forEach(d=>{ batch.update(doc(db,'candidates',d.id),{ votes:0 }); }); const votesSnap = await getDocs(collection(db,'votes')); votesSnap.forEach(d=>{ batch.delete(doc(db,'votes',d.id)); }); const votersSnap2 = await getDocs(collection(db,'voters')); votersSnap2.forEach(d=>{ batch.delete(doc(db,'voters',d.id)); }); await batch.commit(); alert('Reset complete'); renderResults(); renderAdminDashboard(); };
  window.removeIllegalVoter = async (phone, name) => { if(loggedInAdminRole !== 'superadmin') return; if(confirm(`Remove voter "${name}" (${phone})?`)){ const voteQuery = query(collection(db,'votes'), where('phone','==',phone)); const voteSnap = await getDocs(voteQuery); const batch = writeBatch(db); for(const v of voteSnap.docs){ const sel = v.data().selections || {}; for(const [p,cid] of Object.entries(sel)){ const cref = doc(db,'candidates',cid); const csnap = await getDoc(cref); if(csnap.exists()) batch.update(cref,{ votes: Math.max(0,(csnap.data().votes||0)-1) }); } batch.delete(doc(db,'votes',v.id)); } batch.delete(doc(db,'voters',phone)); await batch.commit(); alert('Voter Removed'); renderAdminDashboard(); renderResults(); } };
  window.showChangePassword = function() { const newPass = prompt("Enter new password (6+ chars)"); if(newPass && newPass.length>=6 && loggedInAdminId) { updateDoc(doc(db,'admins',loggedInAdminId), { password: newPass }).then(()=> alert("Password changed")).catch(e=>alert("Error")); } else alert("Password must be 6+ characters"); };
  window.resetAdminPassword = async (id, uname) => { if(loggedInAdminRole !== 'superadmin' && loggedInAdminRole !== 'headadmin') return; const newPass = prompt(`New password for "${uname}"`); if(newPass && newPass.length>=6) { await updateDoc(doc(db,'admins',id), { password: newPass }); alert('Reset successfully'); renderAdminDashboard(); } };
  
  // Admin Panel Toggling Functions
  window.openAdminPanel = function() {
    document.getElementById('adminPanelWrapper').classList.add('open');
    document.getElementById('adminOverlay').classList.add('show');
    if(loggedInAdminRole) renderAdminDashboard();
  };

  window.closeAdminPanel = function() {
    document.getElementById('adminPanelWrapper').classList.remove('open');
    document.getElementById('adminOverlay').classList.remove('show');
  };

  // Secure Login
  window.adminLoginFromSidebar = async function() {
    try {
      const user = document.getElementById('adminUserInside').value.trim();
      const pass = document.getElementById('adminPassInside').value.trim();
      const msgDiv = document.getElementById('adminLoginMsgInside');

      if (!user || !pass) {
        showMsg(msgDiv, 'error', '❌ Please enter both ID and Password');
        return;
      }

      if(user === 'Brahman2026' && pass === 'Mahraj@2026') {
        loggedInAdminRole = 'superadmin'; loggedInUsername = 'Brahman2026'; loggedInAdminId = 'master';
        document.getElementById('adminLoginInside').classList.add('hidden');
        document.getElementById('adminDashboardInside').classList.remove('hidden');
        await renderAdminDashboard();
        showMsg(msgDiv, 'success', '✅ Main Admin Login Successful');
        return;
      }

      const adminsSnap = await getDocs(collection(db,'admins'));
      let valid = false, role = '', id = '';
      
      adminsSnap.forEach(d => { 
        if(d.data().username === user && d.data().password === pass) { 
          valid = true; role = d.data().role; id = d.id; loggedInUsername = user; 
        } 
      });

      if(valid) { 
        loggedInAdminRole = role; loggedInAdminId = id; 
        document.getElementById('adminLoginInside').classList.add('hidden'); 
        document.getElementById('adminDashboardInside').classList.remove('hidden'); 
        await renderAdminDashboard(); showMsg(msgDiv,'success','✅ Login Successful'); 
      } else { showMsg(msgDiv,'error','❌ Invalid Credentials'); }
      
    } catch (error) {
      console.error("Login Error: ", error);
      alert("Database Access Error: " + error.message);
    }
  };

  window.adminLogout = function() { 
    loggedInAdminRole = null; 
    document.getElementById('adminLoginInside').classList.remove('hidden'); 
    document.getElementById('adminDashboardInside').classList.add('hidden'); 
    document.getElementById('adminUserInside').value = 'Brahman2026'; 
    document.getElementById('adminPassInside').value = ''; 
    window.closeAdminPanel(); 
  };
  
  async function fillSelfPostDropdown() { const posts = await loadActivePosts(); const select = document.getElementById('selfPost'); select.innerHTML = `<option value="">${langData[currentLang].selectPostOpt}</option>`+posts.map(p=>`<option value="${p.name}">${p.name}</option>`).join(''); }
  
  (async function init() { 
    try {
      await ensureMainAdmin(); 
      await ensureDefaultPosts(); 
      await loadActivePosts(); 
      await loadSettingsAndApply(); 
      await fillSelfPostDropdown(); 
      await renderResults(); 
      setInterval(renderResults, 5000); 
    } catch (e) {
      console.error("Initialization Error: ", e);
    }
  })();
</script>
